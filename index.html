<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#5b7fff">
<link rel="manifest" href="./manifest.json">
<title>初级经济师每日一练 - 科目选择</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;background:#f0f2f8;color:#1a1a2e;line-height:1.6}

/* 顶部切换栏 */
#subject-bar{
  position:fixed;top:0;left:0;right:0;z-index:9998;
  background:linear-gradient(135deg,#5b7fff,#7c3aed);
  display:flex;align-items:center;padding:0 12px;
  height:50px;box-shadow:0 2px 16px rgba(91,127,255,.4);
}
#subject-bar .bar-title{
  flex:1;font-size:16px;font-weight:800;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.subj-btn{
  padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;
  cursor:pointer;border:2px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.15);color:#fff;
  transition:all .2s;white-space:nowrap;margin-left:6px;
}
.subj-btn.active{
  background:#fff;color:#5b7fff;border-color:#fff;
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
#fullscreen-btn{
  padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;
  cursor:pointer;border:2px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.15);color:#fff;
  transition:all .2s;white-space:nowrap;margin-left:6px;
}
#fullscreen-btn:hover{background:rgba(255,255,255,.3)}

/* iframe 容器 */
#iframe-wrap{
  position:fixed;top:50px;left:0;right:0;bottom:0;
  background:#f0f2f8;
}
.app-frame{
  position:absolute;inset:0;
  width:100%;height:100%;
  border:none;
  display:none;
}
.app-frame.active{display:block}

/* 首次加载遮罩 */
#loading-mask{
  position:fixed;inset:0;top:50px;
  background:#f0f2f8;z-index:9000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.spinner{
  width:40px;height:40px;border:4px solid #e5e7eb;
  border-top-color:#5b7fff;border-radius:50%;
  animation:spin .8s linear infinite;
}
.loading-text{margin-top:16px;font-size:14px;color:#9ca3af}
@keyframes spin{to{transform:rotate(360deg)}}

/* 小提示 */
#tip-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:9998;
  background:rgba(255,255,255,.92);backdrop-filter:blur(8px);
  padding:8px 16px;font-size:12px;color:#9ca3af;
  border-top:1px solid #e5e7eb;
  text-align:center;
  display:none;
}
#tip-bar.show{display:block}
</style>
</head>
<body>

<!-- 顶部切换栏 -->
<div id="subject-bar">
  <div class="bar-title" id="bar-title">📚 初级经济师每日一练</div>
  <button class="subj-btn active" id="btn-econ" onclick="switchSubject('econ')">📊 经济基础</button>
  <button class="subj-btn" id="btn-biz" onclick="switchSubject('biz')">🏢 工商管理</button>
  <button id="fullscreen-btn" onclick="toggleFullscreen()" title="全屏">⛶</button>
</div>

<!-- 加载遮罩 -->
<div id="loading-mask">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">加载中...</div>
</div>

<!-- iframe 容器 -->
<div id="iframe-wrap">
  <iframe id="frame-econ" class="app-frame active" src="每日一练_初级经济师_v5_0410_2115.html"></iframe>
  <iframe id="frame-biz"   class="app-frame"       src="每日一练_初级工商管理_最终版.html"></iframe>
</div>

<!-- 底部提示 -->
<div id="tip-bar">💡 提示：首次使用需在各科目内登录，建议使用右上角 ⛶ 全屏获得最佳体验</div>

<script>
// ---------- 配置 ----------
var APPS = {
  econ: {
    title: '📚 初级经济师每日一练',
    frame: 'frame-econ',
    file: '每日一练_初级经济师_v5_0410_2115.html',
    btn: 'btn-econ'
  },
  biz: {
    title: '🏢 工商管理每日一练',
    frame: 'frame-biz',
    file: '每日一练_初级工商管理_最终版.html',
    btn: 'btn-biz'
  }
};

var currentSubject = 'econ';
var isFullscreen = false;

// ---------- 切换科目 ----------
function switchSubject(subj) {
  if (subj === currentSubject) return;
  currentSubject = subj;

  // 更新 iframe
  Object.keys(APPS).forEach(function(key) {
    var frame = document.getElementById(APPS[key].frame);
    var btn   = document.getElementById(APPS[key].btn);
    if (key === subj) {
      frame.classList.add('active');
      btn.classList.add('active');
    } else {
      frame.classList.remove('active');
      btn.classList.remove('active');
    }
  });

  // 更新标题
  document.getElementById('bar-title').textContent = APPS[subj].title;
}

// ---------- 全屏切换 ----------
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().then(function() {
      isFullscreen = true;
    }).catch(function(){});
  } else {
    document.exitFullscreen().then(function() {
      isFullscreen = false;
    }).catch(function(){});
  }
}

// ---------- 等待 iframe 加载 ----------
function onFrameReady(subj) {
  document.getElementById('loading-mask').style.display = 'none';
  document.getElementById('tip-bar').classList.add('show');
  // 5秒后自动隐藏提示
  setTimeout(function() {
    document.getElementById('tip-bar').classList.remove('show');
  }, 5000);
}

// 给父页面调用的接口（iframe 中的 app 可通过 parent.onFrameReady 调用）
window.onFrameReady = onFrameReady;
window.switchSubject = switchSubject;

// ---------- 转发用户名变化消息给另一个 iframe ----------
window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'user_changed') return;
  var username = e.data.username || '';
  // 把消息广播给所有 iframe
  Object.values(APPS).forEach(function(app) {
    try {
      document.getElementById(app.frame).contentWindow.postMessage(e.data, '*');
    } catch(err) {}
  });
});

// 监听 iframe load 事件
var loadedFrames = {};
Object.keys(APPS).forEach(function(key) {
  var frame = document.getElementById(APPS[key].frame);
  frame.addEventListener('load', function() {
    loadedFrames[key] = true;
    // 如果是当前选中的科目，显示它
    if (key === currentSubject) {
      onFrameReady(key);
    }
  });
  // 如果是默认科目，标记已尝试加载
  if (key === currentSubject) {
    setTimeout(function() {
      if (!loadedFrames[key]) {
        document.getElementById('loading-text').textContent =
          '首次加载稍慢，请耐心等待...';
      }
    }, 3000);
  }
});

// 检测是否从文件协议打开（手机端文件管理器直接打开）
if (location.protocol === 'file:') {
  // 隐藏全屏按钮（文件协议下部分浏览器不支持）
  document.getElementById('fullscreen-btn').style.display = 'none';
}

// ---------- PWA Service Worker ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function() {
      // SW 注册失败不影响主功能，静默忽略
    });
  });
}
</script>
</body>
</html>
